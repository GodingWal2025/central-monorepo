name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/semantic/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build API
        run: npm run build -w @gxo/api

      # TODO: Uncomment and configure once AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret is set
      # - name: Deploy to Azure Functions
      #   uses: Azure/functions-action@v1
      #   with:
      #     app-name: gxo-operations-api
      #     package: apps/api
      #     publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
      #     respect-funcignore: true

      - name: Build success
        run: echo "API build successful. Configure Azure secrets to enable auto-deploy."

<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT Operator Dashboard - GXO Dock</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/custom.css" rel="stylesheet">
    <style>
        body { padding-top: 2rem; background-color: var(--bs-body-bg); }
        .pit-header { border-bottom: 2px solid var(--bs-border-color); margin-bottom: 2rem; padding-bottom: 1rem; }
        .truck-card { transition: transform 0.2s, box-shadow 0.2s; }
        .truck-card:hover { transform: translateY(-5px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
        .status-badge { font-size: 0.9em; padding: 0.4em 0.8em; }
    </style>
</head>
<body>
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center pit-header">
            <div>
                <h1 class="display-6 fw-bold mb-0 font-serif">PIT Operator Terminal</h1>
                <p class="text-muted mb-0">Active Checked-In Trucks</p>
            </div>
            <div class="text-end">
                <span class="fs-4 fw-light font-serif" id="currentTime">--:-- --</span>
            </div>
        </div>

        <div id="loadingIndicator" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Scanning for active trucks...</p>
        </div>

        <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

        <div class="row g-4" id="truckCardsContainer">
            <!-- Truck cards will be dynamically injected here -->
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/pit.js"></script>
    <script>
        setInterval(() => {
            document.getElementById('currentTime').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>

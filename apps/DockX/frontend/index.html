<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1c1917">
  <title>GXO Dock - Operations Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>

  <!-- Mobile Header -->
  <div class="mobile-header d-flex d-lg-none">
    <a class="d-flex align-items-center text-decoration-none" href="#/">
      <span class="sidebar-logo-text">GXO</span>
      <span class="ms-2 fw-bold text-dark" style="font-size: 13px; letter-spacing: 0.05em; font-family: var(--font-sans);">DOCKSCHEDULE</span>
    </a>
    <button class="btn btn-sm btn-outline-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
      <i class="bi bi-list fs-5"></i>
    </button>
  </div>

  <!-- Responsive Sidebar Offcanvas -->
  <div class="offcanvas-lg offcanvas-start sidebar" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
    
    <!-- Brand & Site Header inside Sidebar -->
    <div class="sidebar-logo">
      <a href="#/" class="text-decoration-none">
        <span class="sidebar-logo-text">GXO</span>
      </a>
      <div class="sidebar-subtitle">Operations Hub</div>
      <div class="sidebar-site">Bayer - Albert Lea</div>
    </div>

    <!-- Scrollable content -->
    <div class="sidebar-content">
      
      <!-- SECTION MAIN -->
      <div class="sidebar-section-heading">Main</div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="#/" id="nav-home">
          <i class="bi bi-house-door"></i>
          <span>Home</span>
        </a>
        <a class="sidebar-link" href="#/appointments" id="nav-appointments">
          <i class="bi bi-list-ul"></i>
          <span>Appointments</span>
        </a>
        <a class="sidebar-link" href="#/add-appointment" id="nav-add-appointment">
          <i class="bi bi-plus-circle"></i>
          <span>Add Appointment</span>
        </a>
      </nav>

      <!-- SECTION OPERATIONS -->
      <div class="sidebar-section-heading">Operations</div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="#/check-in" id="nav-check-in">
          <i class="bi bi-box-arrow-in-right"></i>
          <span>Check-In</span>
        </a>
        <a class="sidebar-link" href="#/check-out" id="nav-check-out">
          <i class="bi bi-box-arrow-left"></i>
          <span>Check-Out</span>
        </a>
        <a class="sidebar-link" href="#/kpi-export" id="nav-kpi-export">
          <i class="bi bi-file-earmark-spreadsheet"></i>
          <span>KPI Export</span>
        </a>
      </nav>

      <!-- SECTION EXTERNAL -->
      <div class="sidebar-section-heading">External</div>
      <nav class="sidebar-nav">
        <a class="sidebar-link" href="/pit.html" target="_blank" id="nav-pit-board">
          <i class="bi bi-forklift"></i>
          <span>PIT App <i class="bi bi-box-arrow-up-right ms-1" style="font-size: 0.8rem;"></i></span>
        </a>
        <a class="sidebar-link" href="#/admin" id="nav-admin">
          <i class="bi bi-gear"></i>
          <span>Admin</span>
        </a>
      </nav>
    </div>

    <!-- Bottom Site info aligned -->
    <div class="sidebar-footer">
      <div class="fw-semibold text-dark mb-1" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;">Site</div>
      <div class="text-dark" style="font-weight: 500; font-size: 13px;">Bayer - Albert Lea</div>
      <div style="font-size: 11px; color: var(--ink-faint);">Active hub site</div>
    </div>
  </div>

  <!-- Main Wrapper -->
  <div class="main-wrapper">
    
    <!-- Main Content Panel -->
    <main class="flex-grow-1 py-4 py-lg-5">
      <div class="container-fluid" id="app">
        <!-- SPA views will be injected here dynamically -->
      </div>
    </main>

    <!-- Footer inside main wrapper -->
    <footer class="text-center py-3 mt-auto border-top" style="background: transparent !important; border-top: 1px solid var(--rule-soft) !important;">
      <div class="container">
        <small class="text-muted" style="font-family: var(--font-sans); font-size:11px; letter-spacing:.06em; text-transform:uppercase;">
          GXO Dock Schedule &copy; 2026
        </small>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
